<!DOCTYPE html>
<html>
<head>
    <title>大尺寸去過國家地球儀</title>
    <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
    <script src="https://unpkg.com/topojson@3/dist/topojson.min.js"></script>
    <style>
        body { background: linear-gradient(to bottom, #000428, #004e92); text-align: center; margin: 20px; font-family: Arial, sans-serif; color: white; }
        #worldmap { margin: 20px auto; }
        #worldmap svg { background: rgba(50,167,224,0.3); border-radius: 50%; box-shadow: 0 0 50px rgba(255,255,255,0.3); cursor: grab; transition: transform 0.3s; }
        #worldmap svg:hover { transform: scale(1.02); }
        #worldmap svg:active { cursor: grabbing; }
        .ocean { fill: #001122; }
        .land { fill: rgba(200,200,200,0.7); stroke: rgba(255,255,255,0.5); stroke-width: 0.5px; transition: all 0.3s; }
        .visited { fill: #FFD700 !important; stroke: #FFA500 !important; stroke-width: 2px; filter: drop-shadow(0 0 5px #FFD700); }
        .land:hover { fill: #FF8C00 !important; stroke-width: 2px; }
        #info { font-size: 18px; margin: 20px; }
        #error { color: #FF6B6B; font-size: 16px; }
        @media (max-width: 768px) { #worldmap svg { width: 400px; height: 400px; } }
    </style>
</head>
<body>
    <h1>🌍 我的去過國家地球儀</h1>
    <div id="worldmap"></div>
    <p id="info">拖曳旋轉地球 | 黃金色=去過國家 | Hover查看國家資訊</p>
    <p id="error" style="display:none;"></p>

    <script>
        let width = Math.min(window.innerWidth * 0.8, 900);
        let height = width;
        const projection = d3.geoOrthographic()
            .scale(width * 0.25)
            .translate([width / 2, height / 2])
            .clipAngle(90);

        const path = d3.geoPath().projection(projection);
        const svg = d3.select("#worldmap").append("svg")
            .attr("width", width).attr("height", height)
            .call(d3.drag().on("drag", dragRotate));

        // 用國家名匹配（避ISO undefined）
        const visitedNames = ['Taiwan', 'Japan', 'United States of America', 'Canada', 'Korea'];  // 改你的，console會顯示確切名

        d3.json("https://unpkg.com/world-atlas@2.0.2/countries-110m.json").then(world => {
            const land = topojson.feature(world, world.objects.countries);

            svg.append("path").datum({type: "Sphere"}).attr("class", "ocean").attr("d", path);

            const lands = svg.selectAll(".land").data(land.features).enter().append("path")
                .attr("class", "land")
                .attr("d", path);

            let visitedCount = 0;
            lands.each(function(d) {
                const props = d.properties;
                const name = props.name || '';
                if (visitedNames.some(v => name.includes(v))) {
                    d3.select(this).classed("visited", true);
                    visitedCount++;
                }
            });

            console.log(`標記 ${visitedCount} 國 (names: ${visitedNames.join(', ')})`);

            lands.on("mouseover", function(event, d) {
                const props = d.properties;
                const countryName = props.name || 'Unknown';
                const iso = props.iso_a3 || 'N/A';
                d3.select("#info").text(`${countryName} (ISO: ${iso})`);
                console.log('詳細:', props);
            }).on("mouseout", () => {
                d3.select("#info").text(`已標記 ${visitedCount} 國 | 拖曳旋轉 | Hover查看`);
            });

            d3.select("#info").text(`已標記 ${visitedCount} 國！拖曳旋轉探索`);
        }).catch(err => {
            d3.select("#error").text("載入失敗，請檢查網路: " + err).style("display", "block");
        });

        function dragRotate(event) {
            const rotate = projection.rotate();
            projection.rotate([rotate[0] + event.dx * 0.5, Math.max(-90, Math.min(90, rotate[1] - event.dy * 0.5))]);
            svg.selectAll("path").attr("d", path);
        }

        // 響應式
        window.onresize = () => location.reload();
    </script>
</body>
</html>
