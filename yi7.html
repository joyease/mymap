<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>赫學堂｜思想與科技的交會點</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
 --ink:#1c1c2e;
 --paper:#f6f1e8;
 --muted:#7a746d;

 --c1:#e76f51;
 --c2:#457b9d;
 --c3:#2a9d8f;
}

body{
 font-family:'Noto Sans TC',sans-serif;
 background:var(--paper);
 color:var(--ink);
}

/* HERO（縮小） */
.hero{
 text-align:center;
 padding:60px 16px 40px;
}

.hero-title{
 font-family:'Noto Serif TC',serif;
 font-size:42px;
 letter-spacing:4px;
}

.hero-sub{
 margin-top:10px;
 font-size:12px;
 letter-spacing:.15em;
 color:#a65a2a;
}

.hero-desc{
 margin-top:12px;
 font-size:14px;
 line-height:1.6;
}

/* 三大主軸（密度優化） */
.feature{
 max-width:1000px;
 margin:24px auto;
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:12px;
}

@media(max-width:768px){
 .feature{
  grid-template-columns:1fr;
  gap:10px;
  margin:16px auto;
 }
}

.feature-card{
 padding:20px;
 border-radius:14px;
 background:white;
 transition:.25s;
}

.feature-card:hover{
 transform:translateY(-5px);
 box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.f1{border-top:4px solid var(--c1);}
.f2{border-top:4px solid var(--c2);}
.f3{border-top:4px solid var(--c3);}

.feature-title{
 font-family:'Noto Serif TC',serif;
 font-size:22px;
 margin-bottom:6px;
}

.feature-desc{
 font-size:13px;
 line-height:1.6;
}

/* 子分類（更緊湊） */
.feature-links{
 margin-top:10px;
 display:flex;
 flex-wrap:wrap;
 gap:6px;
}

.feature-links a{
 font-size:11px;
 padding:5px 8px;
 border-radius:16px;
 background:#f1ece4;
 text-decoration:none;
 color:#333;
}

.feature-links a:hover{
 background:#000;
 color:#fff;
}

/* 標題（縮） */
.section-title{
 text-align:center;
 margin-top:40px;
 font-family:'Noto Serif TC',serif;
 font-size:22px;
}

/* 卡片區（密度核心） */
.grid{
 max-width:1000px;
 margin:24px auto;
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:12px;
}

@media(max-width:768px){
 .grid{
  grid-template-columns:1fr;
  gap:10px;
 }
}

.card{
 background:white;
 padding:20px;
 border-radius:14px;
 text-decoration:none;
 color:inherit;
}

.card:hover{
 transform:translateY(-4px);
 box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card-title{
 font-family:'Noto Serif TC',serif;
 font-size:18px;
 margin-bottom:6px;
}

.card-desc{
 font-size:12px;
 line-height:1.6;
}

/* FOOTER（縮） */
.footer{
 text-align:center;
 margin:40px 0;
 font-size:12px;
 line-height:1.6;
 color:#6b645c;
}
</style>
